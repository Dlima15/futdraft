<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futdraft | Fim do Torneio</title>
    <link rel="stylesheet" href="../assets/css/resumo.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="tela-resumo">

    <div class="luz-ambiente-vitoria"></div>

    <main class="container-app">
        
        <header class="cabecalho-resumo">
            <span class="emoji-festa"></span>
            <h1 class="titulo-vitoria">Torneio Finalizado</h1>
            <p class="data-sessao">18 de Abril, 2026</p>
        </header>

        <section class="card-campeao animar-entrada">
            <div class="coroa"></div>
            <div class="escudo-campeao">AM</div>
            <h2 class="nome-campeao">Time Amarelo</h2>
            <p class="status-campeao">Grande Campeão do Draft</p>
            
            <div class="stats-rapidas">
                <div class="stat-item">
                    <strong>4</strong>
                    <span>Vitórias</span>
                </div>
                <div class="stat-item">
                    <strong>12</strong>
                    <span>Gols</span>
                </div>
            </div>
        </section>

        <section class="secao-ranking animar-subir">
            <h3 class="titulo-tabela">Classificação Geral</h3>
            
            <div class="tabela-vidro">
                <div class="linha-ranking">
                    <span class="pos">1º</span>
                    <span class="time">Amarelo</span>
                    <span class="pts">12 pts</span>
                </div>
                <div class="linha-ranking">
                    <span class="pos">2º</span>
                    <span class="time">Verde</span>
                    <span class="pts">07 pts</span>
                </div>
                <div class="linha-ranking">
                    <span class="pos">3º</span>
                    <span class="time">Azul</span>
                    <span class="pts">04 pts</span>
                </div>
                <div class="linha-ranking fora">
                    <span class="pos">4º</span>
                    <span class="time">Vermelho</span>
                    <span class="pts">01 pts</span>
                </div>
            </div>
        </section>

        <section class="card-artilheiro animar-subir" style="animation-delay: 0.2s;">
            <div class="info-artilheiro">
                <p class="label">Artilheiro do Dia ⚽</p>
                <h4 class="nome-jogador">Juninho "O Brabo"</h4>
            </div>
            <div class="gols-count">7 Gols</div>
        </section>

        <footer class="rodape-reset">
            <button class="botao-novo-draft">
                <span>Reiniciar Novo Draft</span>
            </button>
            <button class="btn-texto">Compartilhar Resumo</button>
        </footer>

    </main>

</body>
</html>
