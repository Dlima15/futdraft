<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futdraft | Próxima Rodada</title>
    <link rel="stylesheet" href="../assets/css/resultado.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="tela-transicao">

    <div class="luz-ambiente"></div>

    <main class="container-app">
        
        <header class="cabecalho-simples">
            <h1 class="titulo-sessao">Resultado da partida</h1>
        </header>

        <section class="card-resultado-final animar-entrada">
            <div class="time-resultado">
                <span class="cor-time fundo-amarelo"></span>
                <span class="nome">Amarelo</span>
            </div>
            <div class="placar-final">
                <span class="num">1</span>
                <span class="divisor">x</span>
                <span class="num">0</span>
            </div>
            <div class="time-resultado">
                <span class="nome">Azul</span>
                <span class="cor-time fundo-azul"></span>
            </div>
        </section>

        <section class="secao-proximo-jogo animar-subir">
            <p class="etiqueta-foco">PRÓXIMO JOGO</p>
            
            <div class="duelo-container">
                <div class="bloco-duelo borda-neon-amarela">
                    <div class="sigla-duelo">AM</div>
                    <span class="txt-time">Amarelo</span>
                </div>

                <div class="vs-identificador">VS</div>

                <div class="bloco-duelo borda-neon-verde">
                    <div class="sigla-duelo">VE</div>
                    <span class="txt-time">Verde</span>
                </div>
            </div>
        </section>

        <section class="secao-espera animar-subir">
            <h3 class="titulo-espera">Ficam de fora</h3>
            <div class="grade-espera">
                <div class="item-espera">
                    <span class="ponto azul"></span>
                    Azul
                </div>
                <div class="item-espera">
                    <span class="ponto vermelho"></span>
                    Vermelho
                </div>
            </div>
        </section>

        <footer class="rodape-acao">
            <button class="botao-proxima-partida">
                <div class="efeito-brilho"></div>
                <span>Iniciar próxima partida</span>
            </button>
        </footer>

    </main>

</body>
</html>
